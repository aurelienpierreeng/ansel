name: Sync Fork

on:
  schedule:
    - cron: '0 6 * * *' # ogni giorno alle 06:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Sync fork
        uses: repo-sync/github-sync@v2
        with:
          source_repo: "https://github.com/mpaglia0/ansel"
          source_branch: "main"
          destination_branch: "main"
          github_token: ${{ secrets.GITHUB_TOKEN }}
