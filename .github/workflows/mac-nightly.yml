name: Nightly Mac PKG

on: 
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  MacOS:
    if: github.repository == 'aurelienpierreeng/ansel' || github.event_name == 'workflow_dispatch'
    name: Nightly Ansel Mac OS build
    runs-on: ${{ matrix.build.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - { os: macos-15, xcode: 26.3, deployment: 15.0 } # AppleClang 17, arm64
        btype:
          - Release
        compiler:
          - { compiler: XCode,   CC: cc, CXX: c++ }
        eco: [-DBINARY_PACKAGE_BUILD=OFF -DUSE_GRAPHICSMAGICK=ON -DUSE_IMAGEMAGICK=OFF]
        target:
          - skiptest # In the case the generic .ci/ci-script.sh script is used.
                     # But in our case, we invoke the more specific .ci/ci-script-mac.sh script
        generator:
          - Ninja
        branch:
          - { code: "${{ github.ref_name }}", label: stable }
        include:
          - arch: arm64
            sse2: OFF
            rosetta: false
          - arch: x86_64
            sse2: ON
            rosetta: true
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.build.xcode }}.app/Contents/Developer
      CC: ${{ matrix.compiler.CC }}
      CXX: ${{ matrix.compiler.CXX }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.build.deployment }}
      SRC_DIR: ${{ github.workspace }}/src
      BUILD_DIR: ${{ github.workspace }}/src/build-${{ matrix.arch }}
      INSTALL_PREFIX: ${{ github.workspace }}/src/install-${{ matrix.arch }}
      ECO: ${{ matrix.eco }}
      CMAKE_BUILD_TYPE: ${{ matrix.btype }}
      GENERATOR: ${{ matrix.generator }}
      TARGET: ${{ matrix.target }}
      BRANCH: ${{ matrix.branch.code }}
      BUILD_NAME: ${{ matrix.branch.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH }}
          fetch-depth: 3000
          submodules: true
          fetch-tags: true
          path: ${{ env.SRC_DIR }}
      # Ensure Rosetta is available (needed for x86 build)
      - name: Install Rosetta
        if: matrix.rosetta
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
      # For non-native x86 build, we need to install the x86 Homebrew first
      - name: Install Intel Homebrew
        if: matrix.arch == 'x86_64'
        run: |
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
      - name: Install Base Dependencies
        run: |
          "${SRC_DIR}"/packaging/install-deps-macos.sh ${{ matrix.arch }}
      - name: Update lensfun data
        if: ${{ success() }}
        run: |
          lensfun-update-data
      - name: Build and Install
        run: |
          cmake -E make_directory "${BUILD_DIR}";
          cmake -E make_directory "${INSTALL_PREFIX}";
          cd "${BUILD_DIR}"
          arch -${{ matrix.arch }} cmake .. \
          -G "${GENERATOR}" \
          -DCMAKE_INSTALL_PREFIX="${INSTALL_PREFIX}"\
          -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
          -DRAWSPEED_ENABLE_LTO=ON \
          -DBUILD_CURVE_TOOLS=OFF \
          -DBUILD_NOISE_TOOLS=OFF \
          -DUSE_LUA=OFF \
          -DUSE_BUNDLED_LUA=OFF \
          -DUSE_LIBRAW=ON \
          -DUSE_BUNDLED_LIBRAW=OFF \
          -DBUILD_SSE2_CODEPATHS=${{ matrix.sse2 }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_COLORD=OFF \
          -DUSE_KWALLET=OFF \
          -DBUILD_CMSTEST=OFF \
          -DBUILD_BENCHMARKING=OFF \
          -DCMAKE_BUILD_TYPE=Release
          -DUSE_OPENMP=ON
          -DDT_MACOS_UNIVERSAL=OFF
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          ${ECO};
          arch -${{ matrix.arch }} cmake --build "$BUILD_DIR" --target install;
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ansel-${{ matrix.arch }}
          path: install-${{ matrix.arch }}

  package:
    needs: MacOS
    runs-on: macos-15
    steps:
      - name: Download artifact x86_64
        uses: actions/download-artifact@v4
        with:
          name: ansel-x86_64
          path: install-x86_64
      - name: Download artifact arm64
        uses: actions/download-artifact@v4
        with:
          name: ansel-arm64
          path: install-arm64
      - name: Merge binaries
        run: |
          mkdir -p universal/bin

          lipo -create \
          install-arm64/bin/ansel \
          install-x86_64/bin/ansel \
          -output universal/bin/ansel
      - name: Merge libraries
        run: |
          find install-arm64 -name "*.dylib" | while read lib; do
            rel="${lib#install-arm64/}"

            if [ -f "install-x86_64/$rel" ]; then
              lipo -create \
                "install-arm64/$rel" \
                "install-x86_64/$rel" \
                -output "install-universal/$rel"
            fi
          done
      - name: Build macOS package
        run: |
          cd install-universal
          ./src/packaging/macosx/3_make_hb_ansel_package.sh
      - name: Create DMG file
        run: |
          cd install-universal
          ./src/packaging/macosx/4_make_hb_ansel_dmg.sh
      - name: Package upload
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ansel.${{ env.BUILD_NAME }}.mac
          path: install-universal/Ansel-*.dmg
          retention-days: 90

  upload_to_release:
    runs-on: ubuntu-latest
    needs: package
    env:
      REPO: "https://github.com/aurelienpierreeng/ansel"
      ROOM: "!SgRYbzspwqwwUgSQHC:matrix.org"
      TAG: "v0.0.0"
    steps:
      - name: Checkout ansel source
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          submodules: false
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ansel.stable.mac
      - name: Update nightly release
        uses: aurelienpierreeng/tip@master
        with:
          tag: ${{ env.TAG }}
          rm: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: Ansel-*.dmg

      - name: Install dependencies
        run: |
          python -m pip install simplematrixbotlib

      - name: Notify Matrix
        if: ${{ success() }}
        run: |
          FILENAME=$(tr '~' '.' <<< "$(find . -type f -iname "Ansel-*.dmg")")
          MESSAGE="New dmg package [${FILENAME}](${{ env.REPO }}/releases/download/${{ env.TAG }}/${FILENAME}) built"
          python .ci/matrix.py \
          -m "$MESSAGE" \
          -s ${{ secrets.MATRIX_SERVER }} \
          -u ${{ secrets.MATRIX_USER }} \
          -t ${{ secrets.MATRIX_ACCESS }} \
          -r ${{ env.ROOM }}
